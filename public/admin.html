<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Menu Admin - Cape Leisure Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent-gold: #C5A880;
      --accent-gold-dark: #A88D65;
      --text-primary: #1A1A1A;
      --bg-primary: #FFFFFF;
      --bg-secondary: #FDFCFB;
      --border-light: #EAEAEA;
      --text-muted: #757575;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --danger: #D32F2F;
      --danger-bg: #FFEBEE;
      --success: #2E7D32;
      --success-bg: #E8F5E9;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html {
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #FFFFFF 0%, #FAF8F5 100%);
      overflow-x: hidden;
    }

    /* ========== LOGIN SCREEN ========== */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 40px 28px;
      box-shadow: 0 15px 35px rgba(197, 168, 128, 0.08), 0 5px 15px rgba(0, 0, 0, 0.02);
      text-align: center;
    }
    .login-title {
      font-family: var(--font-serif);
      font-size: 28px; font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 32px; letter-spacing: 0.02em;
    }
    .login-input {
      width: 100%; padding: 14px 16px;
      font-family: var(--font-sans); font-size: 14px;
      border: 1.5px solid var(--border-light); border-radius: 10px;
      background: var(--bg-secondary); color: var(--text-primary);
      outline: none; transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .login-input:focus { border-color: var(--accent-gold); }
    .login-btn {
      width: 100%; padding: 14px;
      font-family: var(--font-sans); font-size: 14px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--text-primary); color: #FFFFFF;
      border: none; border-radius: 10px; cursor: pointer;
      transition: all 0.2s;
    }
    .login-btn:hover { background: var(--accent-gold-dark); }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      color: var(--danger); font-size: 12px; font-weight: 500;
      margin-top: 12px; min-height: 18px;
    }

    /* ========== ADMIN SHELL ========== */
    .admin-shell { display: none; }
    .admin-shell.active { display: block; }

    /* TOP BAR */
    .top-bar {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-light);
      box-shadow: 0 2px 12px rgba(0,0,0,0.03);
    }
    .top-bar-title {
      font-family: var(--font-serif);
      font-size: 18px; font-weight: 600;
      letter-spacing: 0.06em; color: var(--text-primary);
    }
    .top-bar-actions { display: flex; align-items: center; gap: 10px; }
    .top-bar-link {
      font-family: var(--font-sans); font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--accent-gold-dark); text-decoration: none;
      padding: 7px 12px; border-radius: 6px;
      transition: background 0.2s;
    }
    .top-bar-link:hover { background: rgba(197,168,128,0.1); }
    .signout-btn {
      font-family: var(--font-sans); font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-muted); background: var(--bg-secondary);
      border: 1px solid var(--border-light); border-radius: 6px;
      padding: 7px 12px; cursor: pointer; transition: all 0.2s;
    }
    .signout-btn:hover { color: var(--danger); border-color: var(--danger); }

    /* TAB BUTTONS */
    .tab-bar {
      display: flex; gap: 0;
      padding: 12px 16px 0 16px;
      max-width: 680px; margin: 0 auto;
    }
    .tab-btn {
      flex: 1; padding: 12px 8px;
      font-family: var(--font-sans); font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: none; border: none; border-bottom: 2.5px solid transparent;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { color: var(--text-primary); border-bottom-color: var(--accent-gold); }
    .tab-btn:not(.active):hover { color: var(--accent-gold-dark); }

    /* PANELS */
    .tab-panel { display: none; max-width: 680px; margin: 0 auto; padding: 16px 16px 120px 16px; }
    .tab-panel.active { display: block; }

    /* ========== GROUP SELECTOR PILLS ========== */
    .admin-group-selector {
      display: flex; gap: 8px; flex-wrap: wrap;
      align-items: center; margin-bottom: 16px;
    }
    .admin-group-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-sans); font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 20px;
      border: 1.5px solid var(--border-light);
      background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
      position: relative;
    }
    .admin-group-pill.active {
      background: var(--text-primary); color: #FFFFFF;
      border-color: var(--text-primary);
    }
    .admin-group-pill:not(.active):hover {
      border-color: var(--accent-gold); color: var(--accent-gold-dark);
    }
    .group-delete-x {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%;
      font-size: 10px; line-height: 1; font-weight: 700;
      background: rgba(255,255,255,0.2); color: inherit;
      cursor: pointer; border: none; margin-left: 2px;
      transition: background 0.2s;
    }
    .admin-group-pill.active .group-delete-x { background: rgba(255,255,255,0.25); }
    .admin-group-pill:not(.active) .group-delete-x { background: rgba(0,0,0,0.08); }
    .group-delete-x:hover { background: rgba(211,47,47,0.2); color: var(--danger); }
    .add-group-btn {
      font-family: var(--font-sans); font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 8px 14px; border-radius: 20px;
      border: 1.5px dashed var(--accent-gold);
      background: transparent; color: var(--accent-gold-dark);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .add-group-btn:hover { background: rgba(197,168,128,0.08); }

    /* ========== SECTION CARD ========== */
    .section-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: 12px; margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .section-card-header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 14px;
      cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .section-card-header:hover { background: var(--bg-secondary); }
    .section-title-display {
      font-family: var(--font-serif); font-size: 16px; font-weight: 600;
      letter-spacing: 0.04em; color: var(--text-primary);
      flex: 1; min-width: 0;
    }
    .section-title-input {
      font-family: var(--font-serif); font-size: 16px; font-weight: 600;
      letter-spacing: 0.04em; color: var(--text-primary);
      flex: 1; min-width: 0;
      border: none; border-bottom: 2px solid var(--accent-gold);
      background: transparent; outline: none; padding: 0 0 2px 0;
    }
    .section-badge {
      font-family: var(--font-sans); font-size: 10px; font-weight: 600;
      color: var(--accent-gold-dark); background: rgba(197,168,128,0.12);
      padding: 3px 8px; border-radius: 10px; white-space: nowrap;
    }
    .section-actions { display: flex; align-items: center; gap: 2px; }
    .section-action-btn {
      width: 30px; height: 30px; border-radius: 6px;
      border: none; background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: all 0.15s;
      font-size: 14px;
    }
    .section-action-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .section-action-btn.danger:hover { background: var(--danger-bg); color: var(--danger); }
    .section-chevron-icon {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      width: 18px; height: 18px;
    }
    .section-card.open .section-chevron-icon { transform: rotate(180deg); }
    .section-card-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .section-card.open .section-card-body { max-height: 50000px; }
    .section-card-body-inner { padding: 0 14px 14px 14px; }

    /* ========== ITEM CARD ========== */
    .item-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(197,168,128,0.1);
      border-radius: 10px;
      padding: 14px; margin-bottom: 10px;
      position: relative;
      transition: border-color 0.2s;
    }
    .item-card:hover { border-color: rgba(197,168,128,0.25); }
    .item-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .item-row:last-child { margin-bottom: 0; }

    .item-field-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 3px;
    }

    /* Inline editable text */
    .inline-text {
      cursor: pointer; padding: 2px 4px; border-radius: 4px;
      transition: background 0.15s;
      min-height: 20px; word-break: break-word;
    }
    .inline-text:hover { background: rgba(197,168,128,0.08); }
    .inline-text.placeholder { color: var(--text-muted); font-style: italic; }
    .inline-input {
      font-family: var(--font-sans); font-size: inherit; font-weight: inherit;
      color: var(--text-primary); border: none;
      border-bottom: 2px solid var(--accent-gold);
      background: transparent; outline: none;
      padding: 2px 4px; width: 100%;
    }

    .item-name-text {
      font-family: var(--font-sans); font-size: 14px; font-weight: 600;
      color: var(--text-primary); flex: 1;
    }
    .item-price-text {
      font-family: var(--font-serif); font-size: 14px; font-weight: 700;
      color: var(--accent-gold-dark); white-space: nowrap;
    }
    .item-price-input {
      font-family: var(--font-serif); font-size: 14px; font-weight: 700;
      color: var(--accent-gold-dark); width: 80px; text-align: right;
    }
    .item-desc-text {
      font-size: 12px; color: var(--text-muted); line-height: 1.5;
    }
    .item-num-text {
      font-family: var(--font-serif); font-size: 11px; font-weight: 600;
      color: var(--accent-gold-dark);
    }
    .item-subheader-text {
      font-size: 12px; color: var(--text-muted);
    }

    /* Tags row */
    .tag-toggles { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag-toggle {
      font-family: var(--font-sans); font-size: 10px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 5px;
      cursor: pointer; transition: all 0.2s; border: 1.5px solid;
    }
    .tag-toggle[data-tag="V"] { border-color: #C8E6C9; color: #757575; background: transparent; }
    .tag-toggle[data-tag="V"].on { background: #E8F5E9; color: #1B5E20; border-color: #A5D6A7; }
    .tag-toggle[data-tag="VG"] { border-color: #B2DFDB; color: #757575; background: transparent; }
    .tag-toggle[data-tag="VG"].on { background: #E0F2F1; color: #004D40; border-color: #80CBC4; }
    .tag-toggle[data-tag="GF"] { border-color: #FFE0B2; color: #757575; background: transparent; }
    .tag-toggle[data-tag="GF"].on { background: #FFF3E0; color: #E65100; border-color: #FFCC80; }

    /* Item actions */
    .item-actions-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid rgba(234,234,234,0.6);
    }
    .item-action-btn {
      width: 32px; height: 32px; border-radius: 6px;
      border: none; background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: all 0.15s; font-size: 14px;
    }
    .item-action-btn:hover { background: var(--bg-primary); color: var(--text-primary); }
    .item-action-btn.danger:hover { background: var(--danger-bg); color: var(--danger); }
    .item-reorder-btns { display: flex; gap: 2px; }

    /* Add buttons */
    .add-item-btn, .add-section-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 12px;
      font-family: var(--font-sans); font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      border-radius: 10px; cursor: pointer; transition: all 0.2s;
    }
    .add-item-btn {
      background: rgba(197,168,128,0.06); border: 1.5px dashed rgba(197,168,128,0.4);
      color: var(--accent-gold-dark); margin-top: 6px;
    }
    .add-item-btn:hover { background: rgba(197,168,128,0.12); border-color: var(--accent-gold); }
    .add-section-btn {
      background: transparent; border: 1.5px dashed var(--border-light);
      color: var(--text-muted); margin-top: 4px;
    }
    .add-section-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold-dark); }

    /* ========== BRANDING FORM ========== */
    .branding-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted);
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      font-family: var(--font-sans); font-size: 14px;
      border: 1.5px solid var(--border-light); border-radius: 8px;
      background: var(--bg-primary); color: var(--text-primary);
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent-gold); }

    /* ========== SAVE FAB ========== */
    .save-fab {
      position: fixed; bottom: 24px; left: 16px; right: 16px;
      max-width: 648px; margin: 0 auto;
      z-index: 300;
      display: none; align-items: center; justify-content: center; gap: 10px;
      padding: 16px;
      font-family: var(--font-sans); font-size: 14px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--text-primary); color: #FFFFFF;
      border: none; border-radius: 14px; cursor: pointer;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      transition: all 0.25s;
    }
    @supports (bottom: env(safe-area-inset-bottom)) {
      .save-fab { bottom: calc(24px + env(safe-area-inset-bottom)); }
    }
    .save-fab.visible { display: flex; animation: fabUp 0.35s cubic-bezier(0.16,1,0.3,1); }
    .save-fab:hover { background: var(--accent-gold-dark); }
    .save-fab:active { transform: scale(0.98); }
    .save-fab:disabled { opacity: 0.6; cursor: not-allowed; }
    .save-spinner {
      width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite; display: none;
    }
    .save-fab.saving .save-spinner { display: block; }
    .save-fab.saving .save-label { display: none; }

    @keyframes fabUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== TOAST ========== */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
      z-index: 999; padding: 12px 24px; border-radius: 10px;
      font-family: var(--font-sans); font-size: 13px; font-weight: 600;
      letter-spacing: 0.02em; box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
      pointer-events: none; white-space: nowrap;
    }
    .toast.visible { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success-bg); color: var(--success); }
    .toast.error { background: var(--danger-bg); color: var(--danger); }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 400px) {
      .top-bar { padding: 12px 12px; }
      .top-bar-title { font-size: 16px; }
      .tab-bar { padding: 10px 12px 0 12px; }
      .tab-panel { padding: 12px 12px 120px 12px; }
      .section-card-header { padding: 12px 10px; }
      .section-title-display { font-size: 14px; }
      .item-card { padding: 12px; }
      .login-card { padding: 32px 20px; }
      .login-title { font-size: 24px; }
      .admin-group-pill { font-size: 11px; padding: 7px 12px; }
    }

    /* ========== CONFIRM DIALOG ========== */
    .confirm-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.35); z-index: 500;
      display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    .confirm-overlay.visible { display: flex; }
    .confirm-box {
      background: var(--bg-primary); border-radius: 14px;
      padding: 28px 24px 20px; max-width: 340px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15); text-align: center;
    }
    .confirm-title {
      font-family: var(--font-serif); font-size: 18px; font-weight: 600;
      margin-bottom: 8px; color: var(--text-primary);
    }
    .confirm-message {
      font-size: 13px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.5;
    }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-cancel, .confirm-ok {
      flex: 1; padding: 12px;
      font-family: var(--font-sans); font-size: 13px; font-weight: 600;
      letter-spacing: 0.04em; border-radius: 8px; cursor: pointer;
      transition: all 0.2s; border: none;
    }
    .confirm-cancel {
      background: var(--bg-secondary); color: var(--text-muted);
      border: 1px solid var(--border-light);
    }
    .confirm-cancel:hover { background: var(--border-light); }
    .confirm-ok {
      background: var(--danger); color: #FFFFFF;
    }
    .confirm-ok:hover { background: #B71C1C; }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1 class="login-title">Menu Admin</h1>
      <p class="login-subtitle">Cape Leisure Club - Mamba Point</p>
      <input type="password" class="login-input" id="loginPassword" placeholder="Enter password" autocomplete="current-password">
      <button class="login-btn" id="loginBtn">Sign In</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- ADMIN SHELL -->
  <div class="admin-shell" id="adminShell">
    <!-- TOP BAR -->
    <header class="top-bar">
      <span class="top-bar-title">Menu Admin</span>
      <div class="top-bar-actions">
        <a href="/" target="_blank" class="top-bar-link">View Site</a>
        <button class="signout-btn" id="signoutBtn">Sign Out</button>
      </div>
    </header>

    <!-- TABS -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="menu">Menu Items</button>
      <button class="tab-btn" data-tab="branding">Branding</button>
    </div>

    <!-- MENU ITEMS TAB -->
    <div class="tab-panel active" id="panelMenu" data-tab="menu">
      <div class="admin-group-selector" id="adminGroupSelector"></div>
      <div id="sectionsContainer"></div>
      <button class="add-section-btn" id="addSectionBtn">+ Add Section</button>
    </div>

    <!-- BRANDING TAB -->
    <div class="tab-panel" id="panelBranding" data-tab="branding">
      <div class="branding-form" id="brandingForm"></div>
    </div>
  </div>

  <!-- SAVE FAB -->
  <button class="save-fab" id="saveFab">
    <div class="save-spinner"></div>
    <span class="save-label">Save Changes</span>
  </button>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- CONFIRM DIALOG -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-title" id="confirmTitle">Confirm</div>
      <div class="confirm-message" id="confirmMessage"></div>
      <div class="confirm-actions">
        <button class="confirm-cancel" id="confirmCancel">Cancel</button>
        <button class="confirm-ok" id="confirmOk">Delete</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ======== STATE ========
      let token = sessionStorage.getItem('admin_token') || null;
      let menuData = null;
      let dirty = false;
      let activeGroup = '';
      let activeTab = 'menu';
      let confirmCallback = null;

      // ======== DOM REFS ========
      const $ = id => document.getElementById(id);
      const loginScreen = $('loginScreen');
      const adminShell = $('adminShell');
      const loginPassword = $('loginPassword');
      const loginBtn = $('loginBtn');
      const loginError = $('loginError');
      const signoutBtn = $('signoutBtn');
      const adminGroupSelector = $('adminGroupSelector');
      const sectionsContainer = $('sectionsContainer');
      const addSectionBtn = $('addSectionBtn');
      const brandingForm = $('brandingForm');
      const saveFab = $('saveFab');
      const toast = $('toast');
      const confirmOverlay = $('confirmOverlay');
      const confirmTitle = $('confirmTitle');
      const confirmMessage = $('confirmMessage');
      const confirmCancel = $('confirmCancel');
      const confirmOk = $('confirmOk');

      // ======== UTILITIES ========
      function toKebab(str) {
        return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'untitled';
      }

      function escapeHtml(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      function showToast(msg, type) {
        toast.textContent = msg;
        toast.className = 'toast ' + type;
        requestAnimationFrame(() => { toast.classList.add('visible'); });
        setTimeout(() => { toast.classList.remove('visible'); }, 2500);
      }

      function markDirty() {
        if (!dirty) {
          dirty = true;
          saveFab.classList.add('visible');
        }
      }

      function markClean() {
        dirty = false;
        saveFab.classList.remove('visible');
      }

      function showConfirm(title, message, onOk) {
        confirmTitle.textContent = title;
        confirmMessage.textContent = message;
        confirmCallback = onOk;
        confirmOverlay.classList.add('visible');
      }

      confirmCancel.addEventListener('click', () => { confirmOverlay.classList.remove('visible'); confirmCallback = null; });
      confirmOk.addEventListener('click', () => {
        confirmOverlay.classList.remove('visible');
        if (confirmCallback) { confirmCallback(); confirmCallback = null; }
      });
      confirmOverlay.addEventListener('click', (e) => {
        if (e.target === confirmOverlay) { confirmOverlay.classList.remove('visible'); confirmCallback = null; }
      });

      // ======== AUTH ========
      async function login(password) {
        loginBtn.disabled = true;
        loginError.textContent = '';
        try {
          const res = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
          });
          const data = await res.json();
          if (data.authenticated && data.token) {
            token = data.token;
            sessionStorage.setItem('admin_token', token);
            await initAdmin();
          } else {
            loginError.textContent = 'Invalid password. Please try again.';
          }
        } catch (err) {
          loginError.textContent = 'Connection error. Please try again.';
        }
        loginBtn.disabled = false;
      }

      loginBtn.addEventListener('click', () => login(loginPassword.value));
      loginPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(loginPassword.value); });

      signoutBtn.addEventListener('click', () => {
        token = null;
        sessionStorage.removeItem('admin_token');
        menuData = null;
        dirty = false;
        saveFab.classList.remove('visible');
        adminShell.classList.remove('active');
        loginScreen.style.display = '';
        loginPassword.value = '';
        loginError.textContent = '';
      });

      // ======== INIT ========
      async function initAdmin() {
        loginScreen.style.display = 'none';
        adminShell.classList.add('active');
        try {
          const res = await fetch('/api/menu');
          if (!res.ok) throw new Error('Failed to load');
          menuData = await res.json();
          markClean();
          renderAll();
        } catch (err) {
          showToast('Failed to load menu data', 'error');
        }
      }

      function renderAll() {
        renderGroupSelector();
        renderSections();
        renderBrandingForm();
      }

      // ======== TABS ========
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.dataset.tab === activeTab) return;
          activeTab = btn.dataset.tab;
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === activeTab));
        });
      });

      // ======== GROUP SELECTOR ========
      function renderGroupSelector() {
        if (!menuData) return;
        const groups = menuData.groups.slice().sort((a, b) => a.sortOrder - b.sortOrder);
        let html = '';
        groups.forEach(g => {
          const isActive = g.id === activeGroup;
          html += '<button class="admin-group-pill' + (isActive ? ' active' : '') + '" data-gid="' + escapeHtml(g.id) + '">' +
            '<span class="group-label-text">' + escapeHtml(g.label) + '</span>' +
            '<span class="group-delete-x" data-gid="' + escapeHtml(g.id) + '" title="Delete group">&times;</span>' +
          '</button>';
        });
        html += '<button class="add-group-btn" id="addGroupPill">+ Add</button>';
        adminGroupSelector.innerHTML = html;

        // If no active group, pick first
        if (!activeGroup && groups.length > 0) {
          activeGroup = groups[0].id;
          adminGroupSelector.querySelector('[data-gid="' + activeGroup + '"]').classList.add('active');
        }

        // Events: select group
        adminGroupSelector.querySelectorAll('.admin-group-pill').forEach(pill => {
          pill.addEventListener('click', (e) => {
            if (e.target.classList.contains('group-delete-x')) return;
            const gid = pill.dataset.gid;
            // Double-click to edit label
            // Single click to select
            activeGroup = gid;
            adminGroupSelector.querySelectorAll('.admin-group-pill').forEach(p => p.classList.toggle('active', p.dataset.gid === gid));
            renderSections();
          });
          // Edit label on double-click
          const labelSpan = pill.querySelector('.group-label-text');
          labelSpan.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            const gid = pill.dataset.gid;
            const group = menuData.groups.find(g => g.id === gid);
            if (!group) return;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = group.label;
            input.className = 'inline-input';
            input.style.cssText = 'font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;width:80px;text-align:center;';
            labelSpan.replaceWith(input);
            input.focus();
            input.select();
            function finish() {
              const val = input.value.trim();
              if (val && val !== group.label) {
                group.label = val;
                group.id = toKebab(val);
                // Update section references
                menuData.sections.forEach(s => { if (s.groupId === gid) s.groupId = group.id; });
                if (activeGroup === gid) activeGroup = group.id;
                markDirty();
              }
              renderGroupSelector();
              renderSections();
            }
            input.addEventListener('blur', finish);
            input.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') input.blur(); if (ev.key === 'Escape') { input.value = group.label; input.blur(); } });
          });
        });

        // Delete group
        adminGroupSelector.querySelectorAll('.group-delete-x').forEach(x => {
          x.addEventListener('click', (e) => {
            e.stopPropagation();
            const gid = x.dataset.gid;
            const sectionsInGroup = menuData.sections.filter(s => s.groupId === gid);
            if (sectionsInGroup.length > 0) {
              showToast('Remove all sections first (' + sectionsInGroup.length + ' remaining)', 'error');
              return;
            }
            showConfirm('Delete Group', 'Are you sure you want to delete this group?', () => {
              menuData.groups = menuData.groups.filter(g => g.id !== gid);
              if (activeGroup === gid) activeGroup = menuData.groups.length > 0 ? menuData.groups[0].id : '';
              markDirty();
              renderGroupSelector();
              renderSections();
            });
          });
        });

        // Add group
        const addGroupPill = document.getElementById('addGroupPill');
        if (addGroupPill) {
          addGroupPill.addEventListener('click', () => {
            const label = prompt('New group name:');
            if (!label || !label.trim()) return;
            const id = toKebab(label.trim());
            if (menuData.groups.some(g => g.id === id)) { showToast('Group already exists', 'error'); return; }
            const maxSort = menuData.groups.reduce((m, g) => Math.max(m, g.sortOrder), -1);
            menuData.groups.push({ id, label: label.trim(), sortOrder: maxSort + 1 });
            activeGroup = id;
            markDirty();
            renderGroupSelector();
            renderSections();
          });
        }
      }

      // ======== SECTIONS ========
      function getGroupSections() {
        return menuData.sections
          .filter(s => s.groupId === activeGroup)
          .sort((a, b) => a.sortOrder - b.sortOrder);
      }

      function renderSections() {
        if (!menuData) return;
        const sections = getGroupSections();
        sectionsContainer.innerHTML = '';
        sections.forEach((section, idx) => {
          sectionsContainer.appendChild(createSectionCard(section, idx, sections.length));
        });
      }

      function createSectionCard(section, index, total) {
        const card = document.createElement('div');
        card.className = 'section-card';
        card.dataset.sid = section.id;

        // Header
        const header = document.createElement('div');
        header.className = 'section-card-header';

        // Title (click to edit)
        const titleEl = document.createElement('span');
        titleEl.className = 'section-title-display';
        titleEl.textContent = section.title;
        titleEl.addEventListener('click', (e) => {
          e.stopPropagation();
          const input = document.createElement('input');
          input.type = 'text';
          input.value = section.title;
          input.className = 'section-title-input';
          titleEl.replaceWith(input);
          input.focus();
          input.select();
          function finish() {
            const val = input.value.trim();
            if (val && val !== section.title) {
              section.title = val;
              section.id = toKebab(val);
              markDirty();
            }
            renderSections();
          }
          input.addEventListener('blur', finish);
          input.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') input.blur(); if (ev.key === 'Escape') { input.value = section.title; input.blur(); } });
        });

        // Badge
        const badge = document.createElement('span');
        badge.className = 'section-badge';
        badge.textContent = section.items.length + (section.items.length === 1 ? ' item' : ' items');

        // Actions
        const actions = document.createElement('div');
        actions.className = 'section-actions';

        // Move up
        if (index > 0) {
          const upBtn = document.createElement('button');
          upBtn.className = 'section-action-btn';
          upBtn.innerHTML = '&#9650;';
          upBtn.title = 'Move up';
          upBtn.addEventListener('click', (e) => { e.stopPropagation(); swapSectionOrder(section, -1); });
          actions.appendChild(upBtn);
        }
        // Move down
        if (index < total - 1) {
          const downBtn = document.createElement('button');
          downBtn.className = 'section-action-btn';
          downBtn.innerHTML = '&#9660;';
          downBtn.title = 'Move down';
          downBtn.addEventListener('click', (e) => { e.stopPropagation(); swapSectionOrder(section, 1); });
          actions.appendChild(downBtn);
        }
        // Delete section
        const delBtn = document.createElement('button');
        delBtn.className = 'section-action-btn danger';
        delBtn.innerHTML = '&#128465;';
        delBtn.title = 'Delete section';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showConfirm('Delete Section', 'Delete "' + section.title + '" and all its ' + section.items.length + ' items?', () => {
            menuData.sections = menuData.sections.filter(s => s.id !== section.id);
            markDirty();
            renderSections();
          });
        });
        actions.appendChild(delBtn);

        // Chevron
        const chevron = document.createElement('span');
        chevron.innerHTML = '<svg class="section-chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';

        header.appendChild(titleEl);
        header.appendChild(badge);
        header.appendChild(actions);
        header.appendChild(chevron);

        // Toggle body
        header.addEventListener('click', () => { card.classList.toggle('open'); });

        // Body
        const body = document.createElement('div');
        body.className = 'section-card-body';
        const inner = document.createElement('div');
        inner.className = 'section-card-body-inner';

        section.items.forEach((item, itemIdx) => {
          inner.appendChild(createItemCard(section, item, itemIdx));
        });

        // Add item button
        const addBtn = document.createElement('button');
        addBtn.className = 'add-item-btn';
        addBtn.textContent = '+ Add Item';
        addBtn.addEventListener('click', () => {
          // Auto-increment item number
          const nums = section.items.map(i => parseInt(i.itemNumber)).filter(n => !isNaN(n));
          const nextNum = nums.length > 0 ? Math.max(...nums) + 1 : null;
          const newItem = {
            name: 'New Item',
            price: 0,
            description: null,
            itemNumber: nextNum ? String(nextNum) : null,
            tags: [],
            subHeader: null
          };
          section.items.push(newItem);
          markDirty();
          renderSections();
          // Open this section
          const newCard = sectionsContainer.querySelector('[data-sid="' + section.id + '"]');
          if (newCard) newCard.classList.add('open');
        });
        inner.appendChild(addBtn);
        body.appendChild(inner);

        card.appendChild(header);
        card.appendChild(body);
        return card;
      }

      function swapSectionOrder(section, direction) {
        const sections = getGroupSections();
        const idx = sections.findIndex(s => s.id === section.id);
        const swapIdx = idx + direction;
        if (swapIdx < 0 || swapIdx >= sections.length) return;
        const temp = sections[idx].sortOrder;
        sections[idx].sortOrder = sections[swapIdx].sortOrder;
        sections[swapIdx].sortOrder = temp;
        markDirty();
        renderSections();
      }

      // ======== ITEM CARD ========
      function createItemCard(section, item, itemIdx) {
        const card = document.createElement('div');
        card.className = 'item-card';

        const currency = menuData.branding.currency || 'LE';

        // Row 1: Name + Price
        const row1 = document.createElement('div');
        row1.className = 'item-row';

        const nameEl = createInlineEditable(item.name, 'item-name-text', (val) => {
          item.name = val; markDirty();
        }, 'Item name');

        const priceEl = createInlineEditable(
          item.price + ' ' + currency,
          'item-price-text',
          (val) => {
            const num = parseInt(val.replace(/[^0-9]/g, ''));
            item.price = isNaN(num) ? 0 : num;
            markDirty();
          },
          '0 ' + currency,
          'number',
          item.price
        );

        row1.appendChild(nameEl);
        row1.appendChild(priceEl);
        card.appendChild(row1);

        // Row 2: Description
        const descVal = item.description || '';
        const descEl = createInlineEditable(descVal, 'item-desc-text', (val) => {
          item.description = val || null; markDirty();
        }, 'Add description');
        card.appendChild(descEl);

        // Row 3: Item Number + Sub-header
        const row3 = document.createElement('div');
        row3.className = 'item-row';
        row3.style.gap = '16px';

        const numWrap = document.createElement('div');
        numWrap.style.flex = '0 0 auto';
        const numLabel = document.createElement('div');
        numLabel.className = 'item-field-label';
        numLabel.textContent = 'Item #';
        const numVal = createInlineEditable(item.itemNumber || '', 'item-num-text', (val) => {
          item.itemNumber = val || null; markDirty();
        }, 'Add #');
        numWrap.appendChild(numLabel);
        numWrap.appendChild(numVal);

        const shWrap = document.createElement('div');
        shWrap.style.flex = '1';
        const shLabel = document.createElement('div');
        shLabel.className = 'item-field-label';
        shLabel.textContent = 'Sub-header';
        const shVal = createInlineEditable(item.subHeader || '', 'item-subheader-text', (val) => {
          item.subHeader = val || null; markDirty();
        }, 'No sub-header');
        shWrap.appendChild(shLabel);
        shWrap.appendChild(shVal);

        row3.appendChild(numWrap);
        row3.appendChild(shWrap);
        card.appendChild(row3);

        // Row 4: Tags
        const tagRow = document.createElement('div');
        tagRow.className = 'tag-toggles';
        ['V', 'VG', 'GF'].forEach(tag => {
          const btn = document.createElement('button');
          btn.className = 'tag-toggle' + (item.tags.includes(tag) ? ' on' : '');
          btn.dataset.tag = tag;
          btn.textContent = tag;
          btn.addEventListener('click', () => {
            const idx = item.tags.indexOf(tag);
            if (idx >= 0) { item.tags.splice(idx, 1); btn.classList.remove('on'); }
            else { item.tags.push(tag); btn.classList.add('on'); }
            markDirty();
          });
          tagRow.appendChild(btn);
        });
        card.appendChild(tagRow);

        // Actions row
        const actionsRow = document.createElement('div');
        actionsRow.className = 'item-actions-row';

        const reorderBtns = document.createElement('div');
        reorderBtns.className = 'item-reorder-btns';

        if (itemIdx > 0) {
          const upBtn = document.createElement('button');
          upBtn.className = 'item-action-btn';
          upBtn.innerHTML = '&#9650;';
          upBtn.title = 'Move up';
          upBtn.addEventListener('click', () => {
            [section.items[itemIdx], section.items[itemIdx - 1]] = [section.items[itemIdx - 1], section.items[itemIdx]];
            markDirty();
            renderSections();
            const sc = sectionsContainer.querySelector('[data-sid="' + section.id + '"]');
            if (sc) sc.classList.add('open');
          });
          reorderBtns.appendChild(upBtn);
        }
        if (itemIdx < section.items.length - 1) {
          const downBtn = document.createElement('button');
          downBtn.className = 'item-action-btn';
          downBtn.innerHTML = '&#9660;';
          downBtn.title = 'Move down';
          downBtn.addEventListener('click', () => {
            [section.items[itemIdx], section.items[itemIdx + 1]] = [section.items[itemIdx + 1], section.items[itemIdx]];
            markDirty();
            renderSections();
            const sc = sectionsContainer.querySelector('[data-sid="' + section.id + '"]');
            if (sc) sc.classList.add('open');
          });
          reorderBtns.appendChild(downBtn);
        }
        actionsRow.appendChild(reorderBtns);

        const delBtn = document.createElement('button');
        delBtn.className = 'item-action-btn danger';
        delBtn.innerHTML = '&#128465;';
        delBtn.title = 'Delete item';
        delBtn.addEventListener('click', () => {
          showConfirm('Delete Item', 'Delete "' + item.name + '"?', () => {
            section.items.splice(itemIdx, 1);
            markDirty();
            renderSections();
            const sc = sectionsContainer.querySelector('[data-sid="' + section.id + '"]');
            if (sc) sc.classList.add('open');
          });
        });
        actionsRow.appendChild(delBtn);
        card.appendChild(actionsRow);

        return card;
      }

      function createInlineEditable(value, className, onSave, placeholder, inputType, rawValue) {
        const wrapper = document.createElement('div');
        wrapper.style.flex = className.includes('price') ? '0 0 auto' : '1';
        wrapper.style.minWidth = '0';

        const display = document.createElement('span');
        display.className = 'inline-text ' + className;
        if (value) {
          display.textContent = value;
        } else {
          display.textContent = placeholder || '';
          display.classList.add('placeholder');
        }

        display.addEventListener('click', () => {
          const input = document.createElement('input');
          input.type = inputType === 'number' ? 'number' : 'text';
          input.className = 'inline-input ' + className;
          if (inputType === 'number') {
            input.value = rawValue !== undefined ? rawValue : '';
            input.style.width = '80px';
            input.inputMode = 'numeric';
          } else {
            input.value = display.classList.contains('placeholder') ? '' : display.textContent;
          }
          input.placeholder = placeholder || '';
          display.replaceWith(input);
          input.focus();
          input.select();

          function finish() {
            const val = input.value.trim();
            onSave(val);
            if (inputType === 'number') {
              const num = parseInt(val.replace(/[^0-9]/g, ''));
              const currency = menuData.branding.currency || 'LE';
              display.textContent = (isNaN(num) ? 0 : num) + ' ' + currency;
              display.classList.remove('placeholder');
            } else if (val) {
              display.textContent = val;
              display.classList.remove('placeholder');
            } else {
              display.textContent = placeholder || '';
              display.classList.add('placeholder');
            }
            input.replaceWith(display);
          }
          input.addEventListener('blur', finish);
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') input.blur();
            if (e.key === 'Escape') {
              input.value = display.classList.contains('placeholder') ? '' : (inputType === 'number' && rawValue !== undefined ? rawValue : value);
              input.blur();
            }
          });
        });

        wrapper.appendChild(display);
        return wrapper;
      }

      // ======== ADD SECTION ========
      addSectionBtn.addEventListener('click', () => {
        if (!activeGroup) { showToast('Select or create a group first', 'error'); return; }
        const title = prompt('New section title:');
        if (!title || !title.trim()) return;
        const id = toKebab(title.trim());
        const groupSections = menuData.sections.filter(s => s.groupId === activeGroup);
        const maxSort = groupSections.reduce((m, s) => Math.max(m, s.sortOrder), -1);
        menuData.sections.push({
          id,
          title: title.trim(),
          groupId: activeGroup,
          sortOrder: maxSort + 1,
          items: []
        });
        markDirty();
        renderSections();
      });

      // ======== BRANDING FORM ========
      const brandingFields = [
        { key: 'restaurantName', label: 'Restaurant Name' },
        { key: 'subtitle', label: 'Subtitle' },
        { key: 'tinNumber', label: 'TIN Number' },
        { key: 'phone', label: 'Phone' },
        { key: 'checkoutUrl', label: 'Checkout URL' },
        { key: 'currency', label: 'Currency' },
        { key: 'footerText', label: 'Footer Text' },
        { key: 'footerLinkText', label: 'Footer Link Text' },
        { key: 'footerLinkUrl', label: 'Footer Link URL' }
      ];

      function renderBrandingForm() {
        if (!menuData) return;
        brandingForm.innerHTML = '';
        brandingFields.forEach(field => {
          const group = document.createElement('div');
          group.className = 'form-group';
          const label = document.createElement('label');
          label.className = 'form-label';
          label.textContent = field.label;
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'form-input';
          input.value = menuData.branding[field.key] || '';
          input.placeholder = field.label;
          input.addEventListener('input', () => {
            menuData.branding[field.key] = input.value;
            markDirty();
          });
          group.appendChild(label);
          group.appendChild(input);
          brandingForm.appendChild(group);
        });
      }

      // ======== SAVE ========
      saveFab.addEventListener('click', async () => {
        if (!dirty || !menuData) return;
        saveFab.classList.add('saving');
        saveFab.disabled = true;
        try {
          const res = await fetch('/api/menu-save', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(menuData)
          });
          if (!res.ok) throw new Error('Save failed');
          const result = await res.json();
          if (result.success) {
            menuData.version = result.version;
            menuData.lastModified = result.lastModified;
            markClean();
            showToast('Saved successfully!', 'success');
          } else {
            throw new Error('Save error');
          }
        } catch (err) {
          showToast('Save failed. Please try again.', 'error');
        }
        saveFab.classList.remove('saving');
        saveFab.disabled = false;
      });

      // ======== BOOT ========
      if (token) {
        initAdmin();
      }

    })();
  </script>
</body>
</html>
