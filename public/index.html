  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #FFFFFF;
      --bg-secondary: #FDFCFB;
      --surface-glass: rgba(250, 250, 250, 0.85);
      --text-primary: #1A1A1A;
      --text-muted: #757575;
      --border-light: #EAEAEA;
      --accent-gold: #C5A880;
      --accent-gold-dark: #A88D65;
      --shadow-luxury: 0 15px 35px rgba(197, 168, 128, 0.08), 0 5px 15px rgba(0, 0, 0, 0.02);
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html {
      scroll-behavior: smooth;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(180deg, #FFFFFF 0%, #FAF8F5 100%);
      padding-bottom: 90px;
    }

    .page-wrapper {
      position: relative; overflow: hidden; width: 100%;
    }
    .ambient-glow-1 {
      position: absolute; top: 10%; right: -10%; width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(197, 168, 128, 0.05) 0%, rgba(255, 255, 255, 0) 70%);
      pointer-events: none; z-index: -1;
    }
    .ambient-glow-2 {
      position: absolute; top: 50%; left: -10%; width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(197, 168, 128, 0.03) 0%, rgba(255, 255, 255, 0) 70%);
      pointer-events: none; z-index: -1;
    }

    /* HERO */
    .hero-banner {
      position: relative;
      background: linear-gradient(135deg, #111111 0%, #2A2520 100%);
      color: #FFFFFF;
      padding: 40px 24px 36px 24px;
      text-align: center;
      overflow: hidden;
      border-bottom: 2px solid var(--accent-gold);
    }
    .hero-banner::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(197, 168, 128, 0.15) 0%, transparent 80%);
      pointer-events: none;
    }
    .header-logo-container {
      margin-bottom: 14px; display: inline-block;
      background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 50%;
      border: 1px solid rgba(197, 168, 128, 0.2);
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      transition: transform 0.4s ease;
    }
    .header-logo-container:hover { transform: scale(1.05) rotate(5deg); }
    .header-logo { max-height: 56px; width: auto; object-fit: contain; filter: brightness(0) invert(1) drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .brand-title { font-family: var(--font-serif); font-size: 26px; font-weight: 500; letter-spacing: 0.10em; line-height: 1.2; margin-bottom: 4px; text-transform: uppercase; color: #FFFFFF; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3); white-space: nowrap; }
    .brand-subtitle { font-family: var(--font-serif); font-size: 16px; font-style: italic; color: var(--accent-gold); margin-bottom: 16px; letter-spacing: 0.05em; }
    .brand-meta { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 12px; font-size: 11px; letter-spacing: 0.1em; color: #D1C7BD; flex-wrap: wrap; }
    .tin-number { font-weight: 400; background: rgba(255, 255, 255, 0.08); padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.1); }
    .phone-link {
      display: inline-flex; align-items: center; gap: 6px; color: #FFFFFF; text-decoration: none; font-weight: 600;
      padding: 6px 14px; border: 1px solid var(--accent-gold); border-radius: 25px;
      background: rgba(197, 168, 128, 0.15); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 15px rgba(197, 168, 128, 0.1);
    }
    .phone-link:hover { background: var(--accent-gold); color: #111111; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(197, 168, 128, 0.3); }
    .phone-icon { width: 13px; height: 13px; }

    /* SEARCH */
    .search-container { max-width: 680px; margin: -24px auto 0 auto; padding: 0 24px; position: relative; z-index: 10; }
    .search-wrapper { position: relative; width: 100%; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06); border-radius: 12px; }
    .search-input {
      width: 100%; padding: 16px 16px 16px 48px; font-family: var(--font-sans); font-size: 14px; font-weight: 400;
      border: 1px solid rgba(197, 168, 128, 0.3); border-radius: 12px; background: #FFFFFF; color: var(--text-primary);
      outline: none; transition: all 0.3s ease;
    }
    .search-input:focus { border-color: var(--accent-gold); box-shadow: 0 10px 30px rgba(197, 168, 128, 0.12); }
    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--accent-gold); pointer-events: none; }

    /* CATEGORY NAV (sticky group selector) */
    .category-nav {
      position: sticky; top: 0; background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-light); z-index: 100; width: 100%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
      padding-bottom: 12px;
    }

    /* MENU CONTAINER */
    .menu-container { max-width: 680px; margin: 0 auto; padding: 24px 24px 140px 24px; }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .menu-container { padding-bottom: calc(140px + env(safe-area-inset-bottom)); }
    }

    /* ACCORDION SECTION */
    .menu-section { scroll-margin-top: 70px; margin-bottom: 12px; }

    .section-toggle {
      display: flex; align-items: center; width: 100%; padding: 20px 0;
      background: none; border: none; cursor: pointer; gap: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    .section-title {
      font-family: var(--font-serif); font-size: 22px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-primary);
      position: relative; text-align: left;
    }
    .section-title::after {
      content: ''; position: absolute; bottom: -4px; left: 0; width: 30px; height: 2px;
      background-color: var(--accent-gold);
    }
    .section-count {
      font-family: var(--font-sans); font-size: 11px; font-weight: 600;
      color: var(--accent-gold-dark); background: rgba(197, 168, 128, 0.12);
      padding: 3px 10px; border-radius: 20px; letter-spacing: 0.03em;
    }
    .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-light) 0%, rgba(234, 234, 234, 0) 100%); }
    .section-chevron {
      width: 20px; height: 20px; color: var(--accent-gold-dark);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0;
    }
    .menu-section.open .section-chevron { transform: rotate(180deg); }

    .menu-list {
      display: flex; flex-direction: column; gap: 12px;
      max-height: 0; overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.16, 1, 0.3, 1), padding 0.35s ease;
      padding: 0;
    }
    .menu-section.open .menu-list {
      max-height: 20000px;
      padding: 4px 0 24px 0;
    }

    /* MENU ITEM CARD */
    .menu-item {
      background: var(--surface-glass); border: 1px solid rgba(197, 168, 128, 0.08);
      border-radius: 12px; padding: 16px 18px; box-shadow: var(--shadow-luxury);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden;
    }
    .menu-item::before {
      content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
      background: var(--accent-gold); opacity: 0; transition: opacity 0.3s ease;
    }
    .menu-item:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(197, 168, 128, 0.12), 0 4px 10px rgba(0, 0, 0, 0.01); border-color: rgba(197, 168, 128, 0.25); }
    .menu-item:hover::before { opacity: 1; }

    .menu-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .menu-item-title-block { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .item-number { font-family: var(--font-serif); font-size: 11px; color: var(--accent-gold-dark); font-weight: 600; letter-spacing: 0.05em; margin-bottom: 2px; }
    .menu-item-title { font-family: var(--font-sans); font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text-primary); letter-spacing: -0.01em; }
    .menu-item-price { font-family: var(--font-serif); font-size: 15px; font-weight: 700; color: var(--accent-gold-dark); white-space: nowrap; margin-left: 12px; letter-spacing: 0.02em; }
    .menu-item-desc { font-family: var(--font-sans); font-size: 12px; line-height: 1.55; color: var(--text-muted); font-weight: 400; margin-bottom: 10px; }
    .menu-item-footer { display: flex; justify-content: space-between; align-items: center; }
    .menu-item-tags { display: flex; gap: 5px; }
    .tag { font-family: var(--font-sans); font-size: 9px; font-weight: 700; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; }
    .tag-v { background-color: #E8F5E9; color: #1B5E20; }
    .tag-gf { background-color: #FFF3E0; color: #E65100; }
    .tag-vg { background-color: #E0F2F1; color: #004D40; }

    /* ADD TO CART BUTTON */
    .add-btn {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--accent-gold); border: none; cursor: pointer;
      color: #FFFFFF; font-size: 20px; font-weight: 600; line-height: 1;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(197, 168, 128, 0.3);
    }
    .add-btn:hover { transform: scale(1.1); background: var(--accent-gold-dark); }
    .add-btn:active { transform: scale(0.95); }

    .qty-controls {
      display: flex; align-items: center; gap: 8px;
    }
    .qty-btn {
      width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--accent-gold);
      background: #FFFFFF; color: var(--accent-gold-dark); font-size: 16px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; line-height: 1;
    }
    .qty-btn:hover { background: var(--accent-gold); color: #FFFFFF; }
    .qty-value {
      font-family: var(--font-sans); font-size: 14px; font-weight: 700;
      color: var(--text-primary); min-width: 20px; text-align: center;
    }

    /* FLOATING CART BAR */
    .cart-fab {
      position: fixed; bottom: 24px; left: 24px; right: 24px;
      z-index: 999; background: var(--text-primary); border: none; border-radius: 16px;
      padding: 14px 20px; cursor: pointer;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: none; align-items: center; gap: 12px;
      max-width: 680px; margin: 0 auto;
    }
    @supports (bottom: env(safe-area-inset-bottom)) {
      .cart-fab { bottom: calc(24px + env(safe-area-inset-bottom)); }
    }
    .cart-fab.visible { display: flex; animation: fabSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .cart-fab:hover { box-shadow: 0 15px 45px rgba(0, 0, 0, 0.35); }
    .cart-fab:active { transform: scale(0.98); }
    .cart-fab-badge {
      background: var(--accent-gold); color: #FFFFFF; font-family: var(--font-sans);
      font-size: 12px; font-weight: 700; width: 26px; height: 26px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cart-fab-label { font-family: var(--font-sans); color: #FFFFFF; font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; flex: 1; }
    .cart-fab-total { font-family: var(--font-serif); color: var(--accent-gold); font-size: 16px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }

    @keyframes fabSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* CART DRAWER */
    .cart-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.4); z-index: 10000; opacity: 0;
      visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .cart-overlay.active { opacity: 1; visibility: visible; }

    .cart-drawer {
      position: fixed; bottom: 0; left: 0; width: 100%; max-height: 80vh;
      background: #FFFFFF; z-index: 10001; border-radius: 20px 20px 0 0;
      transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; flex-direction: column;
      box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.15);
    }
    .cart-drawer.active { transform: translateY(0); }

    .cart-drawer-handle {
      width: 40px; height: 4px; background: var(--border-light);
      border-radius: 2px; margin: 12px auto 0 auto;
    }
    .cart-drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid var(--border-light);
    }
    .cart-drawer-title {
      font-family: var(--font-serif); font-size: 18px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-primary);
    }
    .cart-clear-btn {
      font-family: var(--font-sans); font-size: 12px; font-weight: 600;
      color: #E53935; background: rgba(229, 57, 53, 0.08); border: none;
      padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s ease;
    }
    .cart-clear-btn:hover { background: rgba(229, 57, 53, 0.15); }

    .cart-drawer-body { flex: 1; overflow-y: auto; padding: 16px 24px; -webkit-overflow-scrolling: touch; }

    .cart-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid var(--border-light);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-family: var(--font-sans); font-size: 14px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-unit { font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .cart-item-right { display: flex; align-items: center; gap: 14px; margin-left: 12px; }
    .cart-item-qty {
      display: flex; align-items: center; gap: 6px;
    }
    .cart-item-qty button {
      width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border-light);
      background: #FFFFFF; color: var(--text-primary); font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; line-height: 1;
    }
    .cart-item-qty button:hover { border-color: var(--accent-gold); color: var(--accent-gold-dark); }
    .cart-item-qty span {
      font-family: var(--font-sans); font-size: 14px; font-weight: 700; min-width: 18px; text-align: center;
    }
    .cart-item-subtotal { font-family: var(--font-serif); font-size: 14px; font-weight: 700; color: var(--accent-gold-dark); white-space: nowrap; min-width: 65px; text-align: right; }

    .cart-drawer-footer {
      padding: 18px 24px; border-top: 1px solid var(--border-light);
      background: var(--bg-secondary);
      padding-bottom: calc(18px + env(safe-area-inset-bottom, 0px));
    }
    .cart-total-row {
      display: flex; justify-content: space-between; align-items: center;
    }
    .cart-total-label { font-family: var(--font-sans); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-primary); }
    .cart-total-value { font-family: var(--font-serif); font-size: 22px; font-weight: 700; color: var(--accent-gold-dark); }

    .cart-checkout-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; margin-top: 14px; padding: 16px; border: none; border-radius: 14px;
      background: var(--text-primary); color: #FFFFFF; cursor: pointer;
      font-family: var(--font-sans); font-size: 14px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }
    .cart-checkout-btn:hover { background: var(--accent-gold-dark); transform: translateY(-1px); box-shadow: 0 8px 25px rgba(197, 168, 128, 0.3); }
    .cart-checkout-btn:active { transform: translateY(0); }
    .cart-checkout-btn svg { width: 18px; height: 18px; }
    .cart-empty-msg {
      text-align: center; padding: 40px 24px; color: var(--text-muted);
      font-size: 14px; font-weight: 400;
    }

    /* PAY FAB */
    .pay-fab {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: #FFFFFF; border: 1px solid var(--accent-gold);
      border-radius: 30px; padding: 16px 36px; cursor: pointer;
      box-shadow: 0 10px 40px rgba(197, 168, 128, 0.25);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      white-space: nowrap;
    }
    @supports (bottom: env(safe-area-inset-bottom)) {
      .pay-fab { bottom: calc(24px + env(safe-area-inset-bottom)); }
    }
    .pay-fab:hover { transform: translateX(-50%) translateY(-3px); box-shadow: 0 15px 45px rgba(197, 168, 128, 0.4); background: var(--text-primary); border-color: var(--text-primary); }
    .pay-fab:hover span { color: #FFFFFF; }
    .pay-fab:hover svg { color: var(--accent-gold); }
    .pay-fab:active { transform: translateX(-50%) translateY(0); }
    .pay-fab span { font-family: var(--font-sans); color: var(--text-primary); font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; transition: color 0.3s ease; }
    .pay-fab-icon { width: 16px; height: 16px; color: var(--accent-gold-dark); transition: color 0.3s ease; }

    .pay-fab.hidden { display: none; }

    /* CHECKOUT MODAL */
    .checkout-modal {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--bg-primary); z-index: 10000;
      display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      visibility: hidden;
    }
    .checkout-modal.active { transform: translateY(0); visibility: visible; }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 18px 24px; border-bottom: 1px solid var(--border-light);
      background: var(--bg-primary); padding-top: calc(18px + env(safe-area-inset-top, 0px));
    }
    .modal-title { font-family: var(--font-serif); font-size: 17px; font-weight: 600; letter-spacing: 0.08em; color: var(--text-primary); text-transform: uppercase; flex: 1; min-width: 0; }
    .close-btn {
      background: var(--bg-secondary); border: 1px solid var(--border-light);
      font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--text-primary);
      cursor: pointer; padding: 10px 20px; border-radius: 25px; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; letter-spacing: 0.05em;
      flex-shrink: 0; white-space: nowrap;
    }
    .close-btn:hover { background: var(--text-primary); color: #FFFFFF; border-color: var(--text-primary); }
    .modal-body { flex: 1; width: 100%; overflow: hidden; position: relative; background: #FFFFFF; -webkit-overflow-scrolling: touch; }
    .modal-iframe { width: 100%; height: 100%; border: none; display: block; }

    /* GROUP SELECTOR */
    .group-selector {
      display: flex; gap: 8px; padding: 12px 24px 0 24px;
      max-width: 728px; margin: 0 auto;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .group-selector::-webkit-scrollbar { display: none; }
    .group-btn {
      font-family: var(--font-sans); font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 20px;
      border-radius: 20px; border: 1.5px solid var(--border-light);
      background: transparent; color: var(--text-muted); cursor: pointer;
      transition: all 0.3s ease; white-space: nowrap; flex-shrink: 0;
    }
    .group-btn.active {
      background: var(--text-primary); color: #FFFFFF; border-color: var(--text-primary);
    }
    .group-btn:not(.active):hover { border-color: var(--accent-gold); color: var(--accent-gold-dark); }


    /* SUB-HEADER INSIDE ACCORDION */
    .menu-sub-header {
      font-family: var(--font-serif); font-size: 15px; font-weight: 600;
      color: var(--accent-gold-dark); letter-spacing: 0.06em;
      padding: 16px 0 8px 0; border-bottom: 1px solid rgba(197, 168, 128, 0.15);
      margin-bottom: 4px; text-transform: uppercase;
    }
    .menu-sub-header:first-child { padding-top: 0; }

    /* EMPTY SEARCH */
    .empty-search-state {
      display: none; text-align: center; padding: 64px 24px;
      color: var(--text-muted); font-size: 14px; font-weight: 400;
      border: 1px dashed var(--accent-gold); border-radius: 12px;
      background: var(--surface-glass);
    }
    .empty-search-state.visible { display: block; }

    /* FOOTER */
    .site-footer {
      text-align: center; padding: 24px; font-family: var(--font-sans);
      font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em;
    }
    .site-footer a {
      color: var(--accent-gold-dark); text-decoration: none; font-weight: 600;
      transition: color 0.2s ease;
    }
    .site-footer a:hover { color: var(--text-primary); }

    /* LOADING SHIMMER */
    .menu-loading {
      display: flex; flex-direction: column; gap: 16px; padding: 8px 0;
    }
    .shimmer-block {
      height: 60px; border-radius: 12px;
      background: linear-gradient(90deg, #f0ede8 25%, #faf8f5 50%, #f0ede8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ERROR STATE */
    .menu-error {
      text-align: center; padding: 64px 24px;
      color: var(--text-muted); font-size: 14px;
    }
    .menu-error-icon { font-size: 48px; margin-bottom: 16px; display: block; }

    /* RESPONSIVE */
    @media (max-width: 400px) {
      .hero-banner { padding: 32px 16px 28px 16px; }
      .brand-title { font-size: 22px; letter-spacing: 0.08em; }
      .brand-subtitle { font-size: 14px; margin-bottom: 12px; }
      .brand-meta { gap: 8px; }
      .section-title { font-size: 18px; }
      .section-count { font-size: 10px; padding: 2px 8px; }
      .section-toggle { gap: 10px; padding: 16px 0; }
      .menu-container { padding: 16px 16px 140px 16px; }
      .search-container { padding: 0 16px; }
      .group-selector { padding: 12px 16px 0 16px; }
      .group-btn { font-size: 11px; padding: 7px 14px; }
      .menu-item { padding: 14px 14px; }
      .menu-item-title { font-size: 13px; }
      .menu-item-price { font-size: 14px; }
      .menu-item-desc { font-size: 11px; }
      .pay-fab { padding: 14px 28px; }
      .modal-header { padding: 14px 16px; padding-top: calc(14px + env(safe-area-inset-top, 0px)); }
      .modal-title { font-size: 14px; letter-spacing: 0.04em; }
      .close-btn { padding: 8px 16px; font-size: 11px; }
    }
    @media (max-width: 340px) {
      .brand-title { font-size: 19px; letter-spacing: 0.06em; }
      .section-title { font-size: 16px; letter-spacing: 0.04em; }
      .group-btn { font-size: 10px; padding: 6px 12px; }
      .pay-fab { padding: 12px 22px; }
      .modal-title { font-size: 13px; letter-spacing: 0.02em; }
      .close-btn { padding: 8px 14px; }
    }
  </style>
  <!-- Flot dashboard Web Analytics tracker -->
  <script defer src="https://dashboard.flotme.ai/api/public/tracker.js?id=25da80ad-9001-4451-b5ec-547c56f6c9d5"></script>
</head>
<body>
<div class="page-wrapper">
  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <!-- HERO -->
  <header class="hero-banner" id="menuHeader">
    <div class="header-logo-container">
      <img src="./images-removebg-preview.png" alt="Cape Leisure Club Logo" class="header-logo" id="headerLogo">
    </div>
    <h1 class="brand-title" id="brandTitle">Cape Leisure Club</h1>
    <p class="brand-subtitle" id="brandSubtitle">Mamba Point</p>
    <div class="brand-meta">
      <span class="tin-number" id="tinNumber">TIN# 1000003124</span>
      <a href="tel:099100100" class="phone-link" id="phoneLink">
        <svg class="phone-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg>
        <span id="phoneNumber">099100100</span>
      </a>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-container">
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search the menu..." aria-label="Search menu items">
    </div>
  </div>

  <!-- CATEGORY NAV -->
  <nav class="category-nav" id="categoryNav">
    <div class="group-selector" id="groupSelector"></div>
  </nav>

  <!-- MENU -->
  <main class="menu-container" id="menuContainer">
    <div class="menu-loading" id="menuLoading">
      <div class="shimmer-block"></div>
      <div class="shimmer-block"></div>
      <div class="shimmer-block"></div>
      <div class="shimmer-block"></div>
      <div class="shimmer-block"></div>
      <div class="shimmer-block"></div>
    </div>
    <div class="empty-search-state" id="emptySearchState">No items match your search term. Please try another query.</div>
  </main>

  <footer class="site-footer" id="siteFooter">
    Powered by <a href="https://www.flotme.ai/business" target="_blank" rel="noopener noreferrer">Flot Business</a>
  </footer>

  <!-- FLOATING CART BAR -->
  <button class="cart-fab" id="cartFab" aria-label="View your cart">
    <span class="cart-fab-badge" id="cartBadge">0</span>
    <span class="cart-fab-label">View Order</span>
    <span class="cart-fab-total" id="cartFabTotal">0 LE</span>
  </button>

  <!-- PAY BILL (hidden when cart is active) -->
  <button class="pay-fab" id="payFab" aria-label="Open payment checkout modal">
    <svg class="pay-fab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
    <span>PAY BILL</span>
  </button>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-drawer" id="cartDrawer" role="dialog" aria-label="Your order">
    <div class="cart-drawer-handle"></div>
    <div class="cart-drawer-header">
      <span class="cart-drawer-title">Your Order</span>
      <button class="cart-clear-btn" id="cartClearBtn">Clear All</button>
    </div>
    <div class="cart-drawer-body" id="cartDrawerBody"></div>
    <div class="cart-drawer-footer">
      <div class="cart-total-row">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-value" id="cartTotalValue">0 LE</span>
      </div>
      <button class="cart-checkout-btn" id="cartCheckoutBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
        Pay Now
      </button>
    </div>
  </div>

  <!-- CHECKOUT MODAL -->
  <div class="checkout-modal" id="checkoutModal" aria-hidden="true" role="dialog">
    <div class="modal-header">
      <span class="modal-title">Cape Leisure Club Checkout</span>
      <button class="close-btn" id="closeBtn" aria-label="Close checkout modal">&#x2715; Close</button>
    </div>
    <div class="modal-body">
      <iframe class="modal-iframe" id="checkoutIframe" src="" data-src="https://pay.flotme.ai/lagoonda" allow="payment" title="Flot Checkout Portal"></iframe>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const searchInput = document.getElementById('searchInput');
      const emptySearchState = document.getElementById('emptySearchState');
      const menuContainer = document.getElementById('menuContainer');
      const groupSelector = document.getElementById('groupSelector');
      const menuLoading = document.getElementById('menuLoading');

      const cartFab = document.getElementById('cartFab');
      const cartBadge = document.getElementById('cartBadge');
      const cartFabTotal = document.getElementById('cartFabTotal');
      const cartOverlay = document.getElementById('cartOverlay');
      const cartDrawer = document.getElementById('cartDrawer');
      const cartDrawerBody = document.getElementById('cartDrawerBody');
      const cartTotalValue = document.getElementById('cartTotalValue');
      const cartClearBtn = document.getElementById('cartClearBtn');

      const payFab = document.getElementById('payFab');
      const checkoutModal = document.getElementById('checkoutModal');
      const closeBtn = document.getElementById('closeBtn');
      const iframe = document.getElementById('checkoutIframe');

      let activeGroup = '';
      let menuData = null;
      let sectionGroupMap = {};
      const cart = new Map();
      let currency = 'LE';

      // --- LOAD MENU DATA (Flot dashboard CMS first, then legacy API, then bundled file) ---
      const DASHBOARD_MENU_API = 'https://dashboard.flotme.ai/api/public/menu/25da80ad-9001-4451-b5ec-547c56f6c9d5';
      async function loadMenuData() {
        try {
          const res = await fetch(DASHBOARD_MENU_API);
          if (res.ok) return await res.json();
        } catch (e) { /* dashboard unavailable, try legacy API */ }
        try {
          const res = await fetch('/api/menu');
          if (res.ok) return await res.json();
        } catch (e) { /* legacy API unavailable, try bundled file */ }
        const fallback = await fetch('/menu_data.json');
        if (fallback.ok) return await fallback.json();
        throw new Error('No menu data available');
      }

      try {
        menuData = await loadMenuData();
        currency = menuData.branding.currency || 'LE';
        menuLoading.remove();
        renderBranding(menuData.branding);
        renderGroups(menuData.groups);
        renderSections(menuData.sections);
        renderFooter(menuData.branding);
        switchGroup(menuData.groups[0].id);
      } catch (err) {
        menuLoading.innerHTML = '<div class="menu-error"><span class="menu-error-icon">&#9737;</span>Menu is temporarily unavailable.<br>Please ask your server for assistance.</div>';
        console.error('Menu load error:', err);
        return;
      }

      // --- RENDER FUNCTIONS ---

      function renderBranding(b) {
        document.getElementById('brandTitle').textContent = b.restaurantName;
        document.getElementById('brandSubtitle').textContent = b.subtitle;
        document.getElementById('tinNumber').textContent = b.tinNumber;
        document.getElementById('phoneNumber').textContent = b.phone;
        document.getElementById('phoneLink').href = 'tel:' + b.phone;
        if (b.logoUrl) document.getElementById('headerLogo').src = b.logoUrl;
        if (b.checkoutUrl) iframe.setAttribute('data-src', b.checkoutUrl);
      }

      function renderFooter(b) {
        const footer = document.getElementById('siteFooter');
        if (b.footerText && b.footerLinkText && b.footerLinkUrl) {
          footer.innerHTML = b.footerText + ' <a href="' + b.footerLinkUrl + '" target="_blank" rel="noopener noreferrer">' + b.footerLinkText + '</a>';
        }
      }

      function renderGroups(groups) {
        groupSelector.innerHTML = groups
          .sort((a, b) => a.sortOrder - b.sortOrder)
          .map(g => '<button class="group-btn" data-group="' + g.id + '">' + g.label + '</button>')
          .join('');

        groupSelector.querySelectorAll('.group-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            if (btn.dataset.group === activeGroup) return;
            searchInput.value = '';
            resetSearch();
            switchGroup(btn.dataset.group);
          });
        });
      }

      function renderSections(sections) {
        const chevronSvg = '<svg class="section-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';

        sections.forEach(section => {
          sectionGroupMap[section.id] = section.groupId;

          const sectionEl = document.createElement('section');
          sectionEl.className = 'menu-section';
          sectionEl.id = section.id;

          const itemCount = section.items.length;
          const countLabel = itemCount === 1 ? '1 item' : itemCount + ' items';

          // Section toggle button
          sectionEl.innerHTML = '<button class="section-toggle" aria-expanded="false">' +
            '<h2 class="section-title">' + escapeHtml(section.title) + '</h2>' +
            '<span class="section-count">' + countLabel + '</span>' +
            '<div class="section-line"></div>' +
            chevronSvg +
            '</button>' +
            '<div class="menu-list">' + renderItems(section.items) + '</div>';

          // Accordion toggle
          sectionEl.querySelector('.section-toggle').addEventListener('click', function() {
            const isOpen = sectionEl.classList.contains('open');
            sectionEl.classList.toggle('open');
            this.setAttribute('aria-expanded', !isOpen);
          });

          menuContainer.insertBefore(sectionEl, emptySearchState);
        });
      }

      function renderItems(items) {
        let html = '';
        let currentSubHeader = null;

        items.forEach(item => {
          // Sub-header
          if (item.subHeader && item.subHeader !== currentSubHeader) {
            currentSubHeader = item.subHeader;
            html += '<div class="menu-sub-header">' + escapeHtml(item.subHeader) + '</div>';
          } else if (!item.subHeader && currentSubHeader) {
            currentSubHeader = null;
          }

          // Tags
          const tagsHtml = (item.tags || []).map(t => {
            const cls = t === 'V' ? 'tag-v' : t === 'VG' ? 'tag-vg' : t === 'GF' ? 'tag-gf' : '';
            return '<span class="tag ' + cls + '">' + t + '</span>';
          }).join('');

          // Item number
          const numHtml = item.itemNumber ? '<span class="item-number">' + escapeHtml(item.itemNumber) + '</span>' : '';

          // Description
          const descHtml = item.description ? '<p class="menu-item-desc">' + escapeHtml(item.description) + '</p>' : '';

          html += '<div class="menu-item" data-name="' + escapeAttr(item.name) + '" data-price="' + item.price + '">' +
            '<div class="menu-item-header">' +
              '<div class="menu-item-title-block">' + numHtml +
                '<h3 class="menu-item-title">' + escapeHtml(item.name) + '</h3>' +
              '</div>' +
              '<span class="menu-item-price">' + formatPrice(item.price) + '</span>' +
            '</div>' +
            descHtml +
            '<div class="menu-item-footer">' +
              '<div class="menu-item-tags">' + tagsHtml + '</div>' +
              '<button class="add-btn" aria-label="Add to cart">+</button>' +
            '</div>' +
          '</div>';
        });

        return html;
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function escapeAttr(str) {
        return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      // --- CART & PRICE ---

      function formatPrice(n) {
        return n.toLocaleString('en-US') + ' ' + currency;
      }

      function getCartTotal() {
        let total = 0;
        cart.forEach(item => { total += item.price * item.qty; });
        return total;
      }

      function getCartCount() {
        let count = 0;
        cart.forEach(item => { count += item.qty; });
        return count;
      }

      function updateCartUI() {
        const count = getCartCount();
        const total = getCartTotal();

        cartBadge.textContent = count;
        cartFabTotal.textContent = formatPrice(total);
        cartTotalValue.textContent = formatPrice(total);

        if (count > 0) {
          cartFab.classList.add('visible');
          payFab.classList.add('hidden');
        } else {
          cartFab.classList.remove('visible');
          payFab.classList.remove('hidden');
        }

        document.querySelectorAll('.menu-item').forEach(el => {
          const key = el.dataset.name;
          const footer = el.querySelector('.menu-item-footer');
          const existingControls = footer.querySelector('.qty-controls');
          const addBtn = footer.querySelector('.add-btn');
          const entry = cart.get(key);

          if (entry && entry.qty > 0) {
            if (addBtn) addBtn.style.display = 'none';
            if (!existingControls) {
              const controls = document.createElement('div');
              controls.className = 'qty-controls';
              controls.innerHTML = '<button class="qty-btn qty-minus" aria-label="Decrease quantity">&minus;</button><span class="qty-value">' + entry.qty + '</span><button class="qty-btn qty-plus" aria-label="Increase quantity">+</button>';
              footer.appendChild(controls);
            } else {
              existingControls.querySelector('.qty-value').textContent = entry.qty;
            }
          } else {
            if (addBtn) addBtn.style.display = '';
            if (existingControls) existingControls.remove();
          }
        });

        renderCartDrawer();
      }

      function renderCartDrawer() {
        if (cart.size === 0) {
          cartDrawerBody.innerHTML = '<div class="cart-empty-msg">Your order is empty. Tap + on any item to get started.</div>';
          return;
        }
        let html = '';
        cart.forEach((item, key) => {
          html += '<div class="cart-item" data-key="' + escapeAttr(key) + '">' +
            '<div class="cart-item-info">' +
              '<div class="cart-item-name">' + escapeHtml(item.name) + '</div>' +
              '<div class="cart-item-unit">' + formatPrice(item.price) + ' each</div>' +
            '</div>' +
            '<div class="cart-item-right">' +
              '<div class="cart-item-qty">' +
                '<button class="cart-qty-minus" data-key="' + escapeAttr(key) + '" aria-label="Decrease">&minus;</button>' +
                '<span>' + item.qty + '</span>' +
                '<button class="cart-qty-plus" data-key="' + escapeAttr(key) + '" aria-label="Increase">+</button>' +
              '</div>' +
              '<span class="cart-item-subtotal">' + formatPrice(item.price * item.qty) + '</span>' +
            '</div>' +
          '</div>';
        });
        cartDrawerBody.innerHTML = html;
      }

      // --- GROUP SELECTOR ---

      function getSectionGroup(section) {
        return sectionGroupMap[section.getAttribute('id')] || null;
      }

      function switchGroup(group) {
        activeGroup = group;
        document.querySelectorAll('.group-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.group === group);
        });

        document.querySelectorAll('.menu-section').forEach(section => {
          const g = getSectionGroup(section);
          if (g && g !== group) {
            section.style.display = 'none';
            section.classList.remove('open');
            section.querySelector('.section-toggle').setAttribute('aria-expanded', 'false');
          } else {
            section.style.display = '';
          }
        });

        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // --- ADD TO CART ---

      menuContainer.addEventListener('click', (e) => {
        const addBtn = e.target.closest('.add-btn');
        const plusBtn = e.target.closest('.qty-plus');
        const minusBtn = e.target.closest('.qty-minus');
        const menuItem = e.target.closest('.menu-item');
        if (!menuItem) return;

        const name = menuItem.dataset.name;
        const price = parseInt(menuItem.dataset.price, 10);

        if (addBtn) {
          cart.set(name, { name, price, qty: 1 });
          updateCartUI();
        } else if (plusBtn) {
          const entry = cart.get(name);
          if (entry) { entry.qty++; updateCartUI(); }
        } else if (minusBtn) {
          const entry = cart.get(name);
          if (entry) {
            entry.qty--;
            if (entry.qty <= 0) cart.delete(name);
            updateCartUI();
          }
        }
      });

      // Cart drawer qty buttons
      cartDrawerBody.addEventListener('click', (e) => {
        const plus = e.target.closest('.cart-qty-plus');
        const minus = e.target.closest('.cart-qty-minus');
        if (plus) {
          const key = plus.dataset.key;
          const entry = cart.get(key);
          if (entry) { entry.qty++; updateCartUI(); }
        } else if (minus) {
          const key = minus.dataset.key;
          const entry = cart.get(key);
          if (entry) {
            entry.qty--;
            if (entry.qty <= 0) cart.delete(key);
            updateCartUI();
          }
        }
      });

      // --- CART DRAWER ---

      cartFab.addEventListener('click', () => {
        cartOverlay.classList.add('active');
        cartDrawer.classList.add('active');
        document.body.style.overflow = 'hidden';
      });
      function closeCart() {
        cartOverlay.classList.remove('active');
        cartDrawer.classList.remove('active');
        document.body.style.overflow = '';
      }
      cartOverlay.addEventListener('click', closeCart);
      cartClearBtn.addEventListener('click', () => {
        cart.clear();
        updateCartUI();
        closeCart();
      });

      // --- PAY BILL MODAL ---

      function openCheckout(amount) {
        const base = iframe.getAttribute('data-src');
        const url = amount ? base + '?amount=' + amount + '&editable=false' : base;
        iframe.setAttribute('src', url);
        checkoutModal.classList.add('active');
        checkoutModal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }

      payFab.addEventListener('click', () => openCheckout());

      document.getElementById('cartCheckoutBtn').addEventListener('click', () => {
        const total = getCartTotal();
        closeCart();
        setTimeout(() => openCheckout(total), 300);
      });
      closeBtn.addEventListener('click', () => {
        checkoutModal.classList.remove('active');
        checkoutModal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        iframe.setAttribute('src', '');
      });

      // --- SEARCH ---

      function resetSearch() {
        document.querySelectorAll('.menu-section').forEach(section => {
          const g = getSectionGroup(section);
          section.style.display = (g && g !== activeGroup) ? 'none' : '';
          section.querySelectorAll('.menu-item').forEach(item => { item.style.display = ''; });
        });
        emptySearchState.classList.remove('visible');
      }

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();

        if (!query) {
          resetSearch();
          return;
        }

        let totalVisibleItems = 0;

        document.querySelectorAll('.menu-section').forEach(section => {
          const sectionItems = section.querySelectorAll('.menu-item');
          let visibleInSection = 0;

          sectionItems.forEach(item => {
            const title = item.querySelector('.menu-item-title').textContent.toLowerCase();
            const desc = item.querySelector('.menu-item-desc') ? item.querySelector('.menu-item-desc').textContent.toLowerCase() : '';
            const number = item.querySelector('.item-number') ? item.querySelector('.item-number').textContent.toLowerCase() : '';

            if (title.includes(query) || desc.includes(query) || number.includes(query)) {
              item.style.display = '';
              visibleInSection++;
              totalVisibleItems++;
            } else {
              item.style.display = 'none';
            }
          });

          if (visibleInSection > 0) {
            section.style.display = '';
            section.classList.add('open');
            section.querySelector('.section-toggle').setAttribute('aria-expanded', 'true');
          } else {
            section.style.display = 'none';
          }
        });

        if (totalVisibleItems === 0) {
          emptySearchState.classList.add('visible');
        } else {
          emptySearchState.classList.remove('visible');
        }
      });
    });
  </script>
</div>
</body>
</html>
